name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact: 'sig-macos-arm'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            artifact: 'sig-macos-x64'
          - platform: 'windows-latest'
            args: ''
            artifact: 'sig-windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Beauty Manager Pro v__VERSION__'
          releaseBody: 'Aggiornamento Beauty Manager Pro'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # DOPO tauri-action: raccoglie nsis.zip e sig generati
      - name: Upload nsis.zip to release (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          Write-Host "=== Searching for nsis.zip ==="
          $allFiles = Get-ChildItem -Path src-tauri/target -Recurse -File | Where-Object { $_.Name -match "\.nsis\.zip$" -and $_.Name -notmatch "\.sig$" }
          foreach ($f in $allFiles) {
            Write-Host "Found: $($f.FullName) ($($f.Length) bytes)"
            gh release upload "v$version" "$($f.FullName)" --clobber
            Write-Host "Uploaded!"
          }
          if (-not $allFiles) { Write-Host "WARNING: No nsis.zip found anywhere" }

      # Raccoglie sig per il job updater
      - name: Collect sig files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updater-files | Out-Null
          Get-ChildItem -Path src-tauri/target -Recurse -File | Where-Object { $_.Name -match "\.(nsis\.zip\.sig|app\.tar\.gz\.sig|exe\.sig)$" } | ForEach-Object {
            Write-Host "Sig: $($_.Name)"
            Copy-Item $_.FullName updater-files/
          }
          Get-ChildItem -Path src-tauri/target -Recurse -File | Where-Object { $_.Name -match "\.nsis\.zip$" -and $_.Name -notmatch "\.sig$" } | ForEach-Object {
            Write-Host "Zip: $($_.Name)"
            Copy-Item $_.FullName updater-files/
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: updater-files/
          if-no-files-found: warn

  updater:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "v=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          WIN_SIG=""
          MAC_X64_SIG=""
          MAC_ARM_SIG=""

          # Windows: preferisce nsis.zip.sig, fallback exe.sig
          for f in artifacts/sig-windows/*nsis.zip.sig; do
            [ -f "$f" ] && WIN_SIG=$(cat "$f") && echo "WIN SIG (nsis): found"
          done
          if [ -z "$WIN_SIG" ]; then
            for f in artifacts/sig-windows/*setup.exe.sig; do
              [ -f "$f" ] && WIN_SIG=$(cat "$f") && echo "WIN SIG (exe): found"
            done
          fi

          for f in artifacts/sig-macos-x64/*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_X64_SIG=$(cat "$f") && echo "MAC X64 SIG: found"
          done
          for f in artifacts/sig-macos-arm/*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_ARM_SIG=$(cat "$f") && echo "MAC ARM SIG: found"
          done

          # URL Windows: preferisce nsis.zip se uploadato, altrimenti exe
          WIN_FILE=$(find artifacts/ -name "*.nsis.zip" ! -name "*.sig" -exec basename {} \; | head -1)
          [ -z "$WIN_FILE" ] && WIN_FILE="BeautyManagerPro_${V}_x64-setup.exe"
          echo "WIN_FILE: $WIN_FILE"

          cat > latest.json << EOF
          {
            "version": "${V}",
            "notes": "Aggiornamento Beauty Manager Pro v${V}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/${WIN_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          cat latest.json
          gh release upload "v${V}" latest.json --clobber

      - name: Update release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          NOTES=$(git log -1 --pretty=format:"%B" | grep -v "Co-Authored-By" | head -50)
          gh release edit "v${V}" --notes "${NOTES}" || true
