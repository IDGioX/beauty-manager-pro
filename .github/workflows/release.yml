name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Beauty Manager Pro v__VERSION__'
          releaseBody: |
            ## Download

            **Windows:**
            - `Beauty.Manager.Pro_*_x64-setup.exe` - Installer (consigliato)

            **macOS:**
            - `Beauty.Manager.Pro_*_aarch64.dmg` - Apple Silicon (M1/M2/M3)
            - `Beauty.Manager.Pro_*_x64.dmg` - Intel
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

      # Upload signature files as artifacts for the updater job
      - name: Upload sig files (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: sig-windows
          path: src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

      - name: Upload sig files (macOS aarch64)
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64')
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig

      - name: Upload sig files (macOS x64)
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'x86_64')
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz.sig

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all sig artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs/

      - name: Read signatures
        id: sigs
        run: |
          WIN_SIG=""
          MAC_X64_SIG=""
          MAC_ARM_SIG=""
          if [ -f sigs/sig-windows/*.sig ]; then WIN_SIG=$(cat sigs/sig-windows/*.sig); fi
          if [ -f sigs/sig-macos-x64/*.sig ]; then MAC_X64_SIG=$(cat sigs/sig-macos-x64/*.sig); fi
          if [ -f sigs/sig-macos-aarch64/*.sig ]; then MAC_ARM_SIG=$(cat sigs/sig-macos-aarch64/*.sig); fi
          echo "win=$WIN_SIG" >> $GITHUB_OUTPUT
          echo "mac_x64=$MAC_X64_SIG" >> $GITHUB_OUTPUT
          echo "mac_arm=$MAC_ARM_SIG" >> $GITHUB_OUTPUT

      - name: Create latest.json
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > latest.json << HEREDOC
          {
            "version": "${VERSION}",
            "notes": "Aggiornamento Beauty Manager Pro v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${{ steps.sigs.outputs.win }}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${VERSION}/Beauty.Manager.Pro_${VERSION}_x64-setup.nsis.zip"
              },
              "darwin-x86_64": {
                "signature": "${{ steps.sigs.outputs.mac_x64 }}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${VERSION}/Beauty.Manager.Pro_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${{ steps.sigs.outputs.mac_arm }}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${VERSION}/Beauty.Manager.Pro_aarch64.app.tar.gz"
              }
            }
          }
          HEREDOC

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.version.outputs.version }}" latest.json --clobber
