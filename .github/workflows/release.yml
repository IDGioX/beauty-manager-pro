name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact: 'sig-macos-arm'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            artifact: 'sig-macos-x64'
          - platform: 'windows-latest'
            args: ''
            artifact: 'sig-windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          # Prende il messaggio dell'ultimo commit (senza Co-Authored-By)
          NOTES=$(git log -1 --pretty=format:"%B" | grep -v "Co-Authored-By" | head -50)
          # Salva in file per evitare problemi di encoding
          echo "$NOTES" > /tmp/release_notes.txt

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Beauty Manager Pro v__VERSION__'
          releaseBody: 'Release automatica'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Update release notes from commit
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          NOTES=$(cat /tmp/release_notes.txt)
          gh release edit "v${VERSION}" --notes "${NOTES}" || true

      - name: Upload nsis.zip for Windows updater
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          NSIS_ZIP=$(find src-tauri/target -name "*.nsis.zip" -type f | head -1)
          if [ -n "$NSIS_ZIP" ]; then
            echo "Uploading nsis.zip: $NSIS_ZIP"
            gh release upload "v${VERSION}" "$NSIS_ZIP" --clobber || true
          fi

      - name: Find sig file and save as artifact
        shell: bash
        run: |
          mkdir -p /tmp/sigs
          find src-tauri/target -name "*.sig" -type f | while read f; do
            echo "Found sig: $f"
            cp "$f" /tmp/sigs/
          done
          ls -la /tmp/sigs/ || echo "No sigs found"

      - name: Upload sig artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/sigs/
          if-no-files-found: warn

  updater-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "v=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download sig artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs/

      - name: List all sigs
        run: find sigs/ -type f | sort

      - name: Create latest.json with signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          WIN_SIG=""
          MAC_X64_SIG=""
          MAC_ARM_SIG=""

          # Windows: nsis.zip.sig
          for f in sigs/sig-windows/*nsis.zip.sig; do
            [ -f "$f" ] && WIN_SIG=$(cat "$f") && echo "WIN SIG found: ${WIN_SIG:0:30}..."
          done

          # macOS x64: app.tar.gz.sig
          for f in sigs/sig-macos-x64/*app.tar.gz.sig; do
            [ -f "$f" ] && MAC_X64_SIG=$(cat "$f") && echo "MAC X64 SIG found: ${MAC_X64_SIG:0:30}..."
          done

          # macOS ARM: app.tar.gz.sig
          for f in sigs/sig-macos-arm/*app.tar.gz.sig; do
            [ -f "$f" ] && MAC_ARM_SIG=$(cat "$f") && echo "MAC ARM SIG found: ${MAC_ARM_SIG:0:30}..."
          done

          cat > latest.json << ENDJSON
          {
            "version": "${V}",
            "notes": "Aggiornamento BeautyManagerPro v${V}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_${V}_x64-setup.nsis.zip"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_aarch64.app.tar.gz"
              }
            }
          }
          ENDJSON

          echo "=== latest.json ==="
          cat latest.json
          echo "==================="

          gh release upload "v${V}" latest.json --clobber
