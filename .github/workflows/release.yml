name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact: 'sig-macos-arm'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            artifact: 'sig-macos-x64'
          - platform: 'windows-latest'
            args: ''
            artifact: 'sig-windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      # Build manuale per catturare i file PRIMA che tauri-action li processi
      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      # Salva nsis.zip + sig PRIMA di tauri-action
      - name: Collect updater files (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updater-files | Out-Null
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          Write-Host "Looking in: $nsisDir"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -File | ForEach-Object {
              Write-Host "Found: $($_.Name) ($($_.Length) bytes)"
              Copy-Item $_.FullName updater-files/
            }
          } else {
            Write-Host "NSIS dir not found!"
            # Cerca ovunque
            Get-ChildItem -Path src-tauri -Recurse -File | Where-Object { $_.Name -match "\.nsis\.zip$|\.nsis\.zip\.sig$" } | ForEach-Object {
              Write-Host "Found elsewhere: $($_.FullName)"
              Copy-Item $_.FullName updater-files/
            }
          }
          Write-Host "=== updater-files ==="
          Get-ChildItem updater-files/ -File | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Collect updater files (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p updater-files
          echo "Searching for .sig and .tar.gz files..."
          find src-tauri/target -name "*.app.tar.gz.sig" -type f | while read f; do
            echo "Found sig: $f"
            cp "$f" updater-files/
          done
          find src-tauri/target -name "*.app.tar.gz" -type f | while read f; do
            echo "Found tar.gz: $f"
            # Rinomina per evitare collisioni tra arch
            cp "$f" updater-files/
          done
          echo "=== updater-files ==="
          ls -la updater-files/

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: updater-files/
          if-no-files-found: warn

      # Ora tauri-action fa solo la release (upload asset)
      - name: Create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Beauty Manager Pro v__VERSION__'
          releaseBody: 'Aggiornamento Beauty Manager Pro'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Job finale: assembla latest.json e uploada nsis.zip
  updater:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "v=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Upload nsis.zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          NSIS=$(find artifacts/ -name "*.nsis.zip" ! -name "*.sig" | head -1)
          if [ -n "$NSIS" ]; then
            echo "Uploading nsis.zip: $NSIS"
            gh release upload "v${V}" "$NSIS" --clobber
          else
            echo "WARNING: No nsis.zip found"
          fi

      - name: Create latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          # Leggi le firme
          WIN_SIG=""
          MAC_X64_SIG=""
          MAC_ARM_SIG=""

          # Cerca prima nsis.zip.sig, poi exe.sig come fallback
          for f in artifacts/sig-windows/*nsis.zip.sig; do
            [ -f "$f" ] && WIN_SIG=$(cat "$f") && echo "WIN SIG (nsis): ${WIN_SIG:0:40}..."
          done
          if [ -z "$WIN_SIG" ]; then
            for f in artifacts/sig-windows/*setup.exe.sig; do
              [ -f "$f" ] && WIN_SIG=$(cat "$f") && echo "WIN SIG (exe): ${WIN_SIG:0:40}..."
            done
          fi
          for f in artifacts/sig-macos-x64/*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_X64_SIG=$(cat "$f") && echo "MAC X64 SIG: ${MAC_X64_SIG:0:40}..."
          done
          for f in artifacts/sig-macos-arm/*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_ARM_SIG=$(cat "$f") && echo "MAC ARM SIG: ${MAC_ARM_SIG:0:40}..."
          done

          # Nome del file Windows per l'updater (preferisce nsis.zip, fallback exe)
          WIN_FILE=$(find artifacts/ -name "*.nsis.zip" ! -name "*.sig" -exec basename {} \; | head -1)
          [ -z "$WIN_FILE" ] && WIN_FILE="BeautyManagerPro_${V}_x64-setup.exe"

          # Genera latest.json
          cat > latest.json << EOF
          {
            "version": "${V}",
            "notes": "Aggiornamento Beauty Manager Pro v${V}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/${WIN_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${V}/BeautyManagerPro_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "v${V}" latest.json --clobber

      - name: Update release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.v }}
        run: |
          NOTES=$(git log -1 --pretty=format:"%B" | grep -v "Co-Authored-By" | head -50)
          gh release edit "v${V}" --notes "${NOTES}" || true
