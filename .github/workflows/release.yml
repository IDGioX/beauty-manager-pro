name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            sig_path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/macos'
            sig_name: 'sig-macos-aarch64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            sig_path: 'src-tauri/target/x86_64-apple-darwin/release/bundle/macos'
            sig_name: 'sig-macos-x64'
          - platform: 'windows-latest'
            args: ''
            sig_path: 'src-tauri/target/release/bundle/nsis'
            sig_name: 'sig-windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Beauty Manager Pro v__VERSION__'
          releaseBody: |
            ## Download

            **Windows:**
            - `Beauty.Manager.Pro_*_x64-setup.exe` - Installer (consigliato)

            **macOS:**
            - `Beauty.Manager.Pro_*_aarch64.dmg` - Apple Silicon (M1/M2/M3)
            - `Beauty.Manager.Pro_*_x64.dmg` - Intel
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Find and upload sig files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sig_name }}
          path: "${{ matrix.sig_path }}/"
          if-no-files-found: warn

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs/

      - name: List downloaded files
        run: find sigs/ -type f -name "*.sig" | sort

      - name: Read signatures and create latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          WIN_SIG=""
          MAC_X64_SIG=""
          MAC_ARM_SIG=""

          # Read Windows NSIS signature
          for f in sigs/sig-windows/*.nsis.zip.sig; do
            if [ -f "$f" ]; then WIN_SIG=$(cat "$f"); fi
          done

          # Read macOS x64 signature
          for f in sigs/sig-macos-x64/*.tar.gz.sig; do
            if [ -f "$f" ]; then MAC_X64_SIG=$(cat "$f"); fi
          done

          # Read macOS aarch64 signature
          for f in sigs/sig-macos-aarch64/*.tar.gz.sig; do
            if [ -f "$f" ]; then MAC_ARM_SIG=$(cat "$f"); fi
          done

          echo "Windows sig: ${WIN_SIG:0:20}..."
          echo "macOS x64 sig: ${MAC_X64_SIG:0:20}..."
          echo "macOS arm sig: ${MAC_ARM_SIG:0:20}..."

          # Generate latest.json
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Aggiornamento Beauty Manager Pro v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${VERSION}/Beauty.Manager.Pro_${VERSION}_x64-setup.nsis.zip"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${VERSION}/Beauty.Manager.Pro_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/IDGioX/beauty-manager-pro/releases/download/v${VERSION}/Beauty.Manager.Pro_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          cat latest.json

          # Upload to release
          gh release upload "v${VERSION}" latest.json --clobber

          # Also update the Gist for public access
          echo "$(<latest.json)" > /tmp/gist_latest.json
          gh gist edit 1de50f67291be8d8e72feec4eda38256 -f latest.json /tmp/gist_latest.json || true
